services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mindcare
      POSTGRES_PASSWORD: mindcare
      POSTGRES_DB: mindcare
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
volumes:
  pgdata: