name: MindCare CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mindcare
          POSTGRES_PASSWORD: mindcare
          POSTGRES_DB: mindcare
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/MindCare-DB/package-lock.json

      - name: Install dependencies
        working-directory: src/MindCare-DB
        run: npm ci

      - name: Copy .env.example
        working-directory: src/MindCare-DB
        run: |
          if [ -f .env.example ]; then cp .env.example .env; fi
          echo "DATABASE_URL=postgresql://mindcare:mindcare@localhost:5433/mindcare" >> .env
          echo "REDIS_URL=redis://localhost:6379" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET || 'ci-test-secret-mindcare' }}" >> .env

      - name: Run database migrations
        working-directory: src/MindCare-DB
        run: DATABASE_URL=postgresql://mindcare:mindcare@localhost:5433/mindcare npx drizzle-kit push --force
        env:
          DATABASE_URL: postgresql://mindcare:mindcare@localhost:5433/mindcare

      - name: Run tests
        working-directory: src/MindCare-DB
        run: npm test
        env:
          DATABASE_URL: postgresql://mindcare:mindcare@localhost:5433/mindcare
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-mindcare

  backend-build:
    needs: backend-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/MindCare-DB/package-lock.json

      - name: Install dependencies
        working-directory: src/MindCare-DB
        run: npm ci

      - name: Build TypeScript
        working-directory: src/MindCare-DB
        run: npm run build

      - name: Upload backend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: src/MindCare-DB/dist/
          retention-days: 7

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  lint:
    continue-on-error: true
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/MindCare-DB/package-lock.json

      - name: Install dependencies
        working-directory: src/MindCare-DB
        run: npm ci

      - name: TypeScript type-check
        working-directory: src/MindCare-DB
        run: npx tsc --noEmit
